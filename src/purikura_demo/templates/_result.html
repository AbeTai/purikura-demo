<article class="result-card">
  <div class="compare-grid">
    <figure class="image-card">
      <figcaption>Original</figcaption>
      <img src="{{ original_image_data }}" alt="元画像" />
    </figure>
    <figure class="image-card">
      <figcaption>Processed</figcaption>
      <img src="{{ image_data }}" alt="プリクラ風に加工した画像" />
    </figure>
  </div>
  <dl class="metrics">
    <div>
      <dt>Size</dt>
      <dd>{{ metrics.width }} x {{ metrics.height }}</dd>
    </div>
    <div>
      <dt>Faces</dt>
      <dd>{{ metrics.faces }}</dd>
    </div>
    <div>
      <dt>Preset</dt>
      <dd>{{ metrics.preset }}</dd>
    </div>
    <div>
      <dt>Mode</dt>
      <dd>{{ metrics.mode }}</dd>
    </div>
    <div>
      <dt>Pipeline</dt>
      <dd>{{ metrics.pipeline }}</dd>
    </div>
    <div>
      <dt>Backend</dt>
      <dd>{{ metrics.accelerator }}</dd>
    </div>
  </dl>
  <a class="download-link" href="{{ image_data }}" download="purikura-demo.jpg">Download</a>
  <figure class="debug-card">
    <figcaption>Segmentation Debug</figcaption>
    <img src="{{ segmentation_image_data }}" alt="セグメンテーションデバッグ画像" />
  </figure>
</article>
