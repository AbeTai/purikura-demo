<article class="result-card">
  <div class="image-stage">
    <img src="{{ image_data }}" alt="プリクラ風に加工した画像" />
  </div>
  <dl class="metrics">
    <div>
      <dt>Size</dt>
      <dd>{{ metrics.width }} x {{ metrics.height }}</dd>
    </div>
    <div>
      <dt>Faces</dt>
      <dd>{{ metrics.faces }}</dd>
    </div>
    <div>
      <dt>Preset</dt>
      <dd>{{ metrics.preset }}</dd>
    </div>
  </dl>
  <a class="download-link" href="{{ image_data }}" download="purikura-demo.jpg">Download</a>
</article>
